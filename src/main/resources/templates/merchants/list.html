<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Merchants')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar('merchant')}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>Merchants</h2>

        <button class="btn btn-primary" onclick="openCreateModal()">
            <i class="bi bi-plus"></i>
        </button>

    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Code</th>
            <th>Email</th>
            <th>Status</th>
            <th>Created At</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody id="merchantTable"></tbody>

    </table>

</div>

<!-- Modal -->

<div class="modal fade" id="merchantModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Merchant</h5>
            </div>

            <div class="modal-body">

                <input type="hidden" id="merchantId">

                <div class="mb-3">
                    <label>Code</label>
                    <input id="merchantCode" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Name</label>
                    <input id="merchantName" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input id="email" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Status</label>

                    <select id="mstatus" class="form-select">
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="INACTIVE">INACTIVE</option>
                    </select>

                </div>

            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Close
                </button>

                <button class="btn btn-primary"
                        onclick="saveMerchant()">
                    Save
                </button>

            </div>

        </div>

    </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/merchant.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
