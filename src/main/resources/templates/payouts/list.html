<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Payouts')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar('payout')}"></div>

<div class="container mt-4">

    <div class="row mb-3">

        <div class="col-md-4">
            <select id="merchantId" class="form-select">
                <option value="">All Merchants</option>
            </select>
        </div>

        <div class="col-md-4">
            <select id="payoutStatus" class="form-select">
                <option value="">Status</option>
                <option value="PENDING">Pending</option>
                <option value="INITIATED">Initiated</option>
                <option value="PAID">PAID</option>
                <option value="FAILED">FAILED</option>
            </select>
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100" onclick="loadPayouts()">
                Search
            </button>
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary" onclick="openPayoutModal()">
                New Payout
            </button>
        </div>
    </div>


    <table class="table table-bordered table-striped table-hover">

        <thead class="table-dark">
        <tr>
            <th>Merchant</th>
            <th>Period</th>
            <th>Gross</th>
            <th>Fee</th>
            <th>Payout</th>
            <th>Stripe Payout</th>
            <th>Status</th>
            <th>Payout Date</th>
        </tr>
        </thead>

        <tbody id="payoutTable"></tbody>

    </table>

    <div class="d-flex justify-content-between align-items-center">

        <button class="btn btn-secondary" onclick="previousPage()">
            Previous
        </button>

        <span id="pageInfo"></span>

        <button class="btn btn-secondary" onclick="nextPage()">
            Next
        </button>

    </div>

</div>

<!-- Modal -->

<div class="modal fade" id="payoutModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Create Payout</h5>
            </div>

            <div class="modal-body">

                <div class="col-md-8">
                    <select id="merchantIdModal" class="form-select">
                        <option value="">All Merchants</option>
                    </select>
                </div>

                <hr />

                <div class="mb-3">
                    <label>Period Start</label>
                    <input type="date" id="periodStart" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Period End</label>
                    <input type="date" id="periodEnd" class="form-control">
                </div>

            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Close
                </button>

                <button class="btn btn-primary"
                        onclick="triggerPayout()">
                    Save
                </button>

            </div>

        </div>

    </div>

</div>

<script src="/js/api.js"></script>

<script src="/js/payouts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
