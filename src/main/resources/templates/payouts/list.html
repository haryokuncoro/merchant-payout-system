<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Payouts')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar('payout')}"></div>

<div class="container mt-4">

    <div class="row mb-3">

        <div class="col-md-4">
            <select id="merchantId" class="form-select">
                <option value="">All Merchants</option>
            </select>
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100" onclick="loadPayouts()">
                Search
            </button>
        </div>

    </div>

    <table class="table table-bordered table-striped table-hover">

        <thead class="table-dark">
        <tr>
            <th>Merchant</th>
            <th>Period</th>
            <th>Gross</th>
            <th>Fee</th>
            <th>Payout</th>
            <th>Stripe Payout</th>
            <th>Status</th>
            <th>Payout Date</th>
        </tr>
        </thead>

        <tbody id="payoutTable"></tbody>

    </table>

    <div class="d-flex justify-content-between align-items-center">

        <button class="btn btn-secondary" onclick="previousPage()">
            Previous
        </button>

        <span id="pageInfo"></span>

        <button class="btn btn-secondary" onclick="nextPage()">
            Next
        </button>

    </div>

</div>
<script src="/js/api.js"></script>

<script src="/js/payouts.js"></script>

</body>
</html>
