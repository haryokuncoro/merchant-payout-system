<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm"
     th:fragment="navbar(active)">

    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <span class="bg-primary rounded-2 d-flex align-items-center justify-content-center" style="width:30px;height:30px;">
                <i class="bi bi-shield-lock-fill text-white" style="font-size:.9rem;"></i>
            </span>
            <span class="fw-semibold">Merchant Payout System</span>
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbar">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active=='merchant'} ? ' active'"
                       href="/merchants">
                        <i class="bi bi-shop me-1"></i> Merchants
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active=='fee'} ? ' active'"
                       href="/fees">
                        <i class="bi bi-sliders me-1"></i> Fees Config
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active=='order'} ? ' active'"
                       href="/orders">
                        <i class="bi bi-receipt me-1"></i> Orders
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active=='payout'} ? ' active'"
                       href="/payouts">
                        <i class="bi bi-cash-stack me-1"></i> Payouts
                    </a>
                </li>

            </ul>

            <ul class="navbar-nav">

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-1"
                       href="#"
                       id="accountMenu"
                       role="button"
                       data-bs-toggle="dropdown"
                       aria-expanded="false">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${#authentication?.name} ?: 'Account'">Account</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="accountMenu">
                        <li>
                            <a class="dropdown-item text-danger" href="#" onclick="logout()" id="logoutBtn">
                                <i class="bi bi-box-arrow-right me-2"></i>Logout
                            </a>
                        </li>
                    </ul>
                </li>

            </ul>

        </div>

    </div>

</nav>


</body>
</html>
