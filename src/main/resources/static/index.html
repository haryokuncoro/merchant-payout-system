<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Boot App</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        .status {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
        }

        .subtitle {
            margin-top: 10px;
            color: #94a3b8;
        }

        .badge {
            margin-top: 20px;
            display: inline-block;
            padding: 8px 16px;
            border-radius: 999px;
            background: #22c55e;
            color: #052e16;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status">🚀</div>

    <div class="title">
        Spring Boot App Running
    </div>

    <div class="subtitle">
        The server is alive. Humanity continues.
    </div>

    <div class="badge">
        STATUS: OK
    </div>
</div>

</body>
</html>
