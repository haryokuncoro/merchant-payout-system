replicaCount: 1

image:
  repository: merchant-payout-system
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

# PostgreSQL Configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: postgres
    username: postgres
    password: postgres
    database: payout_system
  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: standard
  service:
    port: 5432

# Kafka Configuration
kafka:
  enabled: true
  replicaCount: 1
  image:
    repository: apache/kafka
    tag: "4.1.0"
  brokerConfig:
    port: 9092
    controllerPort: 9093
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: standard
  service:
    port: 9092

# Stripe Mock Configuration
stripeMock:
  enabled: true
  image:
    repository: stripe/stripe-mock
    tag: latest
  port: 12111

# Spring Boot App Configuration
app:
  replicaCount: 1
  image:
    repository: merchant-payout-system
    pullPolicy: IfNotPresent
    tag: "latest"
  port: 8080

  # Environment variables
  env:
    SPRING_PROFILES_ACTIVE: dev
    SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    STRIPE_SKIP_SIGNATURE_CHECK: "true"
    STRIPE_MOCK_ENABLED: "true"
    STRIPE_MOCK_BASE_URL: "http://stripe-mock:12111"

  # Secrets (should be provided via secrets management)
  secrets:
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgresql:5432/payout_system"
    SPRING_DATASOURCE_USERNAME: postgres
    JWT_SECRET: ""  # Set this value
    STRIPE_API_KEY_SG: ""  # Set this value
    STRIPE_API_KEY_HK: ""  # Set this value
    STRIPE_API_KEY_MY: ""  # Set this value
    STRIPE_WEBHOOK_SECRET: ""  # Set this value

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

# Service configuration
service:
  type: ClusterIP
  port: 8080

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: payout-system.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Security Context
podSecurityContext: {}

# Container Security Context
securityContext: {}

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Node affinity (optional)
nodeSelector: {}
tolerations: []
affinity: {}


