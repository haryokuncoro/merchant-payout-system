{{- if .Values.stripeMock.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stripe-mock
  namespace: {{ .Release.Namespace }}
  labels:
    app: stripe-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stripe-mock
  template:
    metadata:
      labels:
        app: stripe-mock
    spec:
      containers:
      - name: stripe-mock
        image: "{{ .Values.stripeMock.image.repository }}:{{ .Values.stripeMock.image.tag }}"
        ports:
        - containerPort: 12111
          name: stripe-api
        livenessProbe:
          httpGet:
            path: /
            port: 12111
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 12111
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: stripe-mock
  namespace: {{ .Release.Namespace }}
  labels:
    app: stripe-mock
spec:
  type: ClusterIP
  ports:
  - port: 12111
    targetPort: stripe-api
    protocol: TCP
  selector:
    app: stripe-mock
{{- end }}

