# Example values file for development/local deployment
# Use this for local development with Minikube or similar

replicaCount: 1

image:
  repository: merchant-payout-system
  pullPolicy: Never  # Use local image for development
  tag: "latest"

# PostgreSQL Configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: postgres
    username: postgres
    password: postgres
    database: payout_system
  primary:
    persistence:
      enabled: true
      size: 5Gi
      storageClassName: standard
  service:
    port: 5432

# Kafka Configuration
kafka:
  enabled: true
  replicaCount: 1
  image:
    repository: apache/kafka
    tag: "4.1.0"
  brokerConfig:
    port: 9092
    controllerPort: 9093
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: standard
  service:
    port: 9092

# Stripe Mock Configuration
stripeMock:
  enabled: true  # Enable for local testing
  image:
    repository: stripe/stripe-mock
    tag: latest
  port: 12111

# Spring Boot App Configuration
app:
  replicaCount: 1
  image:
    repository: merchant-payout-system
    pullPolicy: Never  # Use local image
    tag: "latest"
  port: 8080

  # Environment variables
  env:
    SPRING_PROFILES_ACTIVE: dev
    SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    STRIPE_SKIP_SIGNATURE_CHECK: "true"
    STRIPE_MOCK_ENABLED: "true"
    STRIPE_MOCK_BASE_URL: "http://stripe-mock:12111"

  # Secrets
  secrets:
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgresql:5432/payout_system"
    SPRING_DATASOURCE_USERNAME: postgres
    JWT_SECRET: "dev-secret-key-12345"
    STRIPE_API_KEY_SG: "sk_test_51234567890"
    STRIPE_API_KEY_HK: "sk_test_98765432101"
    STRIPE_API_KEY_MY: "sk_test_11223344556"
    STRIPE_WEBHOOK_SECRET: "whsec_test_1234567890"

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

  service:
    type: LoadBalancer  # Use LoadBalancer for local access
    port: 8080
    targetPort: 8080

# Service configuration
service:
  type: LoadBalancer
  port: 8080

# Disable ingress for local development
ingress:
  enabled: false

# No autoscaling for development
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

# No node affinity for development
nodeSelector: {}
tolerations: []
affinity: {}

