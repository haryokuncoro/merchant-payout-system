# Example values file for production deployment
# Copy this to custom-values.yaml and update with your actual values

replicaCount: 2

image:
  repository: your-registry/merchant-payout-system
  pullPolicy: IfNotPresent
  tag: "1.0.0"

# PostgreSQL Configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: "change-this-password"
    username: postgres
    password: "change-this-password"
    database: payout_system
  primary:
    persistence:
      enabled: true
      size: 50Gi
      storageClassName: gp3  # Change based on your cloud provider
  service:
    port: 5432

# Kafka Configuration
kafka:
  enabled: true
  replicaCount: 3
  image:
    repository: apache/kafka
    tag: "4.1.0"
  brokerConfig:
    port: 9092
    controllerPort: 9093
  persistence:
    enabled: true
    size: 50Gi
    storageClassName: gp3  # Change based on your cloud provider
  service:
    port: 9092

# Stripe Mock Configuration (disable in production if using real Stripe)
stripeMock:
  enabled: false  # Set to false for production
  image:
    repository: stripe/stripe-mock
    tag: latest
  port: 12111

# Spring Boot App Configuration
app:
  replicaCount: 3
  image:
    repository: your-registry/merchant-payout-system
    pullPolicy: IfNotPresent
    tag: "1.0.0"
  port: 8080

  # Environment variables
  env:
    SPRING_PROFILES_ACTIVE: prod
    SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-0:9092,kafka-1:9092,kafka-2:9092
    STRIPE_SKIP_SIGNATURE_CHECK: "false"
    STRIPE_MOCK_ENABLED: "false"

  # Secrets - USE KUBERNETES SECRETS MANAGEMENT IN PRODUCTION
  secrets:
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgresql:5432/payout_system"
    SPRING_DATASOURCE_USERNAME: postgres
    JWT_SECRET: "your-secure-jwt-secret"
    STRIPE_API_KEY_SG: "sk_live_your_singapore_key"
    STRIPE_API_KEY_HK: "sk_live_your_hongkong_key"
    STRIPE_API_KEY_MY: "sk_live_your_malaysia_key"
    STRIPE_WEBHOOK_SECRET: "whsec_your_webhook_secret"

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

# Service configuration
service:
  type: ClusterIP
  port: 8080

# Ingress configuration - Enable for production
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: payout-system.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: payout-system-tls
      hosts:
        - payout-system.example.com

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Node affinity for production
nodeSelector:
  workload: payout-system

tolerations:
  - key: workload
    operator: Equal
    value: payout-system
    effect: NoSchedule

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - merchant-payout-system
          topologyKey: kubernetes.io/hostname

