name: Build and Trigger ArgoCD Sync

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'src/**'
      - 'helm/**'
      - 'Dockerfile'
      - 'build.gradle'
      - '.github/workflows/argocd-deploy.yaml'
  pull_request:
    branches:
      - develop
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Run tests
        run: ./gradlew test

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  trigger-argocd-sync:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Trigger ArgoCD sync - Dev
        if: github.ref == 'refs/heads/develop'
        uses: omakase/argocd-actions@master
        with:
          address: ${{ secrets.ARGOCD_SERVER }}
          token: ${{ secrets.ARGOCD_TOKEN }}
          action: sync
          appName: merchant-payout-dev
          flags: --force

      - name: Trigger ArgoCD sync - Staging
        if: github.ref == 'refs/heads/main'
        uses: omakase/argocd-actions@master
        with:
          address: ${{ secrets.ARGOCD_SERVER }}
          token: ${{ secrets.ARGOCD_TOKEN }}
          action: sync
          appName: merchant-payout-staging
          flags: --force

      - name: Trigger ArgoCD sync - Prod
        if: startsWith(github.ref, 'refs/tags/')
        uses: omakase/argocd-actions@master
        with:
          address: ${{ secrets.ARGOCD_SERVER }}
          token: ${{ secrets.ARGOCD_TOKEN }}
          action: sync
          appName: merchant-payout-prod
          flags: --force

      - name: Wait for sync to complete - Dev
        if: github.ref == 'refs/heads/develop'
        uses: omakase/argocd-actions@master
        with:
          address: ${{ secrets.ARGOCD_SERVER }}
          token: ${{ secrets.ARGOCD_TOKEN }}
          action: wait
          appName: merchant-payout-dev

      - name: Wait for sync to complete - Staging
        if: github.ref == 'refs/heads/main'
        uses: omakase/argocd-actions@master
        with:
          address: ${{ secrets.ARGOCD_SERVER }}
          token: ${{ secrets.ARGOCD_TOKEN }}
          action: wait
          appName: merchant-payout-staging

      - name: Wait for sync to complete - Prod
        if: startsWith(github.ref, 'refs/tags/')
        uses: omakase/argocd-actions@master
        with:
          address: ${{ secrets.ARGOCD_SERVER }}
          token: ${{ secrets.ARGOCD_TOKEN }}
          action: wait
          appName: merchant-payout-prod

      - name: Post deployment status to Slack
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "ArgoCD Deployment Status",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*ArgoCD Deployment Status*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nStatus: ${{ job.status }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

