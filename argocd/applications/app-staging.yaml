apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: merchant-payout-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/merchant-payout-system
    targetRevision: main
    path: helm
    helm:
      releaseName: merchant-payout
      values: |
        replicaCount: 2
        image:
          repository: your-registry/merchant-payout-system
          tag: staging
          pullPolicy: IfNotPresent
        
        app:
          replicaCount: 2
          env:
            SPRING_PROFILES_ACTIVE: staging
            SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-0:9092,kafka-1:9092
            STRIPE_SKIP_SIGNATURE_CHECK: "false"
            STRIPE_MOCK_ENABLED: "false"
            STRIPE_MOCK_BASE_URL: ""
          secrets:
            SPRING_DATASOURCE_URL: "jdbc:postgresql://postgresql:5432/payout_system"
            SPRING_DATASOURCE_USERNAME: postgres
            JWT_SECRET: "" # Set via external secret management
            STRIPE_API_KEY_SG: "" # Set via external secret management
            STRIPE_API_KEY_HK: "" # Set via external secret management
            STRIPE_API_KEY_MY: "" # Set via external secret management
            STRIPE_WEBHOOK_SECRET: "" # Set via external secret management
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
        
        postgresql:
          enabled: true
          auth:
            password: "" # Set via external secret management
          primary:
            persistence:
              size: 20Gi
        
        kafka:
          enabled: true
          replicaCount: 2
          persistence:
            size: 20Gi
        
        stripeMock:
          enabled: false
        
        ingress:
          enabled: true
          className: nginx
          hosts:
            - host: payout-staging.example.com
              paths:
                - path: /
                  pathType: Prefix
        
        autoscaling:
          enabled: true
          minReplicas: 2
          maxReplicas: 5
          targetCPUUtilizationPercentage: 70

  destination:
    server: https://kubernetes.default.svc
    namespace: merchant-payout-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

