apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # GitHub OAuth configuration (optional)
  # url: https://argocd.example.com
  # oidc.config: |
  #   name: GitHub
  #   issuer: https://token.actions.githubusercontent.com
  #   clientID: your-github-app-id
  #   clientSecret: $github-client-secret
  #   requestedIDTokenAudience: argo-workflows
  #   requestedScopes:
  #     - openid
  #     - profile
  #     - email

  # Notification configuration
  notification.slack.enabled: "false"
  # notification.slack.token: $slack-token

  # DexServer configuration (optional)
  # dex.config: |
  #   connectors:
  #     - type: github
  #       id: github
  #       name: GitHub
  #       config:
  #         clientID: your-client-id
  #         clientSecret: $dex-github-client-secret
  #         orgs:
  #           - name: your-org

  # Resource tracking
  application.resourceTrackingMethod: annotation

  # Webhook configuration
  webhook.github.secret: $github-webhook-secret
  webhook.github.insecure: "false"

  # Server SSL configuration (optional)
  # server.insecure: "false"
  # server.certificate.enabled: "true"

  # Disable built-in admin user
  # admin.enabled: "false"

  # RBAC
  rbac.default.policy.csv: |
    p, role:developers, applications, get, default/*, allow
    p, role:developers, applications, sync, default/*, allow
    p, role:developers, repositories, get, *, allow
    p, role:staging-admins, applications, *, merchant-payout-staging/*, allow
    p, role:prod-admins, applications, *, merchant-payout-prod/*, allow
    
    g, your-github-team, role:developers
    g, your-staging-team, role:staging-admins
    g, your-prod-team, role:prod-admins

  # Timeout configuration
  server.grpc.maxrecvmsgsize: "104857600"
  server.disable.grpc: "false"

  # Reposerver configuration
  reposerver.autoreload: "true"
  reposerver.parallelismduration: "0s"

  # Application
  application.instanceLabelKey: argocd.argoproj.io/instance

