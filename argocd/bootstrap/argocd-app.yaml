apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 7.3.3
    helm:
      releaseName: argocd
      values: |
        global:
          domain: argocd.example.com
        
        configs:
          params:
            application.resourceTrackingMethod: annotation
            server.grpc.maxrecvmsgsize: "104857600"
        
        server:
          extraArgs:
            - --insecure
          metrics:
            enabled: true
            service:
              type: ClusterIP
              port: 8082
          service:
            type: LoadBalancer
            # type: ClusterIP
            # Use Ingress for production
            annotations:
              # cloud.google.com/load-balancer-type: "Internal"
              {}
          ingress:
            enabled: false
            # For production:
            # enabled: true
            # ingressClassName: nginx
            # annotations:
            #   cert-manager.io/cluster-issuer: letsencrypt-prod
            # hosts:
            #   - argocd.example.com
            # tls:
            #   - secretName: argocd-tls
            #     hosts:
            #       - argocd.example.com
          rbac:
            - apiVersion: rbac.authorization.k8s.io/v1
              kind: ClusterRole
              metadata:
                name: argocd-server-github-webhook
              rules:
                - apiGroups:
                    - argoproj.io
                  resources:
                    - applications
                  verbs:
                    - get
                    - list
                    - patch
        
        repoServer:
          metrics:
            enabled: true
            service:
              type: ClusterIP
              port: 8084
          rbac:
            - apiVersion: rbac.authorization.k8s.io/v1
              kind: Role
              metadata:
                name: argocd-repo-server
                namespace: argocd
              rules:
                - apiGroups:
                    - ''
                  resources:
                    - secrets
                  verbs:
                    - get
        
        controller:
          metrics:
            enabled: true
            service:
              type: ClusterIP
              port: 8085
          rbac:
            - apiVersion: rbac.authorization.k8s.io/v1
              kind: ClusterRole
              metadata:
                name: argocd-application-controller
              rules:
                - apiGroups:
                    - '*'
                  resources:
                    - '*'
                  verbs:
                    - '*'
                - nonResourceURLs:
                    - '*'
                  verbs:
                    - '*'
        
        notifications:
          enabled: false
          # For Slack notifications:
          # enabled: true
          # notifiers:
          #   slack:
          #     token: $slack-token
        
        redis:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

