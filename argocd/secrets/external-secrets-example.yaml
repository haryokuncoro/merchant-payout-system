# External Secrets Operator Configuration
# This allows you to manage secrets securely in external systems (AWS Secrets Manager, HashiCorp Vault, etc.)

---
# Example 1: AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: merchant-payout-prod
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets-prod
  namespace: merchant-payout-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: app-secrets-prod
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: /merchant-payout/prod/db/url
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: /merchant-payout/prod/db/username
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: /merchant-payout/prod/db/password
    - secretKey: JWT_SECRET
      remoteRef:
        key: /merchant-payout/prod/jwt/secret
    - secretKey: STRIPE_API_KEY_SG
      remoteRef:
        key: /merchant-payout/prod/stripe/api-key-sg
    - secretKey: STRIPE_API_KEY_HK
      remoteRef:
        key: /merchant-payout/prod/stripe/api-key-hk
    - secretKey: STRIPE_API_KEY_MY
      remoteRef:
        key: /merchant-payout/prod/stripe/api-key-my
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: /merchant-payout/prod/stripe/webhook-secret

---
# Example 2: HashiCorp Vault
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-secrets-store
  namespace: merchant-payout-prod
spec:
  provider:
    vault:
      server: "https://vault.example.com:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "merchant-payout-prod"

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets-vault
  namespace: merchant-payout-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secrets-store
    kind: SecretStore
  target:
    name: app-secrets-prod
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: merchant-payout/prod
        property: db_password
    - secretKey: JWT_SECRET
      remoteRef:
        key: merchant-payout/prod
        property: jwt_secret
    - secretKey: STRIPE_API_KEY_SG
      remoteRef:
        key: merchant-payout/prod
        property: stripe_api_key_sg

---
# Example 3: Azure Key Vault
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-secrets-store
  namespace: merchant-payout-prod
spec:
  provider:
    azurekv:
      authType: workloadIdentity
      vaultUrl: "https://merchant-payout-vault.vault.azure.net/"
      tenantId: "your-tenant-id"

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets-azure
  namespace: merchant-payout-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-secrets-store
    kind: SecretStore
  target:
    name: app-secrets-prod
    creationPolicy: Owner
  data:
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: stripe-webhook-secret

---
# ClusterSecretStore for cluster-wide access (optional)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-cluster-secrets-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets-system

