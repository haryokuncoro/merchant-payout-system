spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

otp.expiration-minutes=5

# ===== Kafka Configuration =====
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS}

# producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.linger.ms=5
spring.kafka.producer.properties.compression.type=snappy

# consumer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.haryokuncoro.ops.dto
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.max-poll-records=50

# listener container
spring.kafka.listener.ack-mode=manual
spring.kafka.listener.concurrency=3

# ===== Stripe Configuration =====
stripe.api-key-sg=${STRIPE_API_KEY_SG}
stripe.api-key-us=${STRIPE_API_KEY_US}
stripe.mock-base-url=${STRIPE_MOCK_BASE_URL}
stripe.mock-enabled=${STRIPE_MOCK_ENABLED}
stripe.skipSignatureCheck=${STRIPE_SKIP_SIGNATURE_CHECK}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

